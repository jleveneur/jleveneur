name: Deploy Portfolio

on:
  push:
    branches:
      - main
    paths:
      - "apps/portfolio/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".github/workflows/deploy-portfolio.yml"

env:
  IMAGE_NAME: ghcr.io/jleveneur/portfolio

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/portfolio/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync infrastructure
        run: |
          rsync -az --delete infra/stacks/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/docker/stacks/
          rsync -az --delete infra/config/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/docker/config/
          rsync -az --delete infra/scripts/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/docker/scripts/

      - name: Deploy portfolio
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            cd /opt/docker/stacks/portfolio &&
            docker compose pull &&
            docker compose up -d
          "