http:
  middlewares:
    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
    
    redirect-www-to-root:
      redirectRegex:
        regex: "^https://www\\.jleveneur\\.com/(.*)"
        replacement: "https://jleveneur.com/$1"
        permanent: true

    compress:
      compress: {}

    dashboard-auth:
      basicAuth:
        users:
          - "julien:$2y$05$KfqFlwY.vaMNCMIgQUzFHOlD49gUkF.M2lFNQC5tc0dSo6LPA5f.e"
